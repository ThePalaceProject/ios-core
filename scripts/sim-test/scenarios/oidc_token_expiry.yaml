name: OIDC Token Expiry Test
library: "iCarus"
precondition: "Already signed in to iCarus"
steps:
  - "Open the app"
  - "Go to My Books"
  - "Wait for sync to complete"
  - "Check if any re-authentication prompts appear"
  - "If prompted, sign in again and verify success"
  - "Try to borrow a new book"
success_criteria:
  - "App handles expired token gracefully"
  - "User can re-authenticate without errors"
  - "Borrowing works after re-auth"
