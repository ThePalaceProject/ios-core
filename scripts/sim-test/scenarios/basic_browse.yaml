name: Basic Catalog Browse
steps:
  - "Launch the Palace app"
  - "Wait for the catalog to load"
  - "Scroll down through the catalog to see available books"
  - "Tap on any book to view its details"
  - "Verify the book detail page shows title, author, and description"
  - "Go back to the catalog"
  - "Switch to a different catalog lane/section if available"
success_criteria:
  - "Catalog loads and displays books"
  - "Book detail page is accessible and shows metadata"
  - "Navigation between catalog and detail works"
