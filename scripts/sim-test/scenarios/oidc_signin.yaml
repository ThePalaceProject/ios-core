name: OIDC Sign-In Flow
library: "iCarus"
credentials:
  email: "${LYRASIS_EMAIL}"
  password: "${LYRASIS_PASSWORD}"
steps:
  - "Launch the Palace app"
  - "Go to Settings"
  - "Long-press the version number at the bottom for 5 seconds to reveal hidden options"
  - "Enable 'Hidden Libraries'"
  - "Go back and add the iCarus library"
  - "Sign in using OIDC with the provided email and password"
  - "Verify you are signed in successfully"
  - "Browse the catalog and borrow a book"
success_criteria:
  - "User is signed in"
  - "A book was successfully borrowed"
