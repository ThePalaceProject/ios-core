scenario:
  id: tab-navigation-stress
  name: "Adversarial: Tab Navigation Stress Test"
  description: "Rapidly switch between all tabs, verify no crashes or blank screens."
  tags: [adversarial, ios, stress]

  steps:
    - id: catalog_tab
      description: "Start on Catalog"
      goal: "Tap the 'Catalog' tab at the bottom left. Verify catalog content loads. Take a screenshot."
      checkpoint: catalog_loaded
      max_iterations: 10

    - id: my_books_tab
      description: "Switch to My Books"
      goal: "Tap the 'My Books' tab. Verify the screen changes to show My Books content (or an empty state message). No crash or blank screen."
      checkpoint: my_books_loaded
      max_iterations: 10

    - id: reservations_tab
      description: "Switch to Reservations"
      goal: "Tap the 'Reservations' tab. Verify the screen shows reservations/holds content (or an empty state). No crash."
      checkpoint: reservations_loaded
      max_iterations: 10

    - id: settings_tab
      description: "Switch to Settings"
      goal: "Tap the 'Settings' tab (gear icon). Verify Settings screen loads with options visible."
      checkpoint: settings_loaded
      max_iterations: 10

    - id: rapid_switch
      description: "Rapid tab switching"
      goal: "Quickly switch between tabs: Catalog -> My Books -> Reservations -> Settings -> Catalog -> My Books. Do this rapidly. After switching, verify the final screen (My Books) is displaying correctly with no artifacts, blank screens, or error dialogs."
      checkpoint: no_crash_after_rapid
      max_iterations: 20

    - id: final_health_check
      description: "Final health check"
      goal: "Take a screenshot and confirm the app is in a healthy state. No error alerts, no blank screens, no loading spinners that never resolve. The app should be responsive."
      checkpoint: healthy
      max_iterations: 10
