scenario:
  id: settings-exploration
  name: "Settings Screen Exploration"
  description: "Navigate to Settings, explore all options, enable debug mode."
  tags: [navigation, ios, settings]

  steps:
    - id: open_settings
      description: "Navigate to Settings tab"
      goal: "Tap the 'Settings' tab at the bottom right of the screen (gear icon). Verify the Settings screen loads."
      checkpoint: settings_visible
      max_iterations: 10

    - id: explore_settings
      description: "Explore settings options"
      goal: "Scroll through the Settings screen and report all visible options/sections. Note any account information, library name, version number."
      checkpoint: settings_explored
      max_iterations: 10

    - id: enable_debug
      description: "Enable debug/testing mode"
      goal: "Find the version number at the very bottom of the Settings screen. Long-press (press and hold for 5 seconds) on the version number text. A testing/debug section should appear."
      checkpoint: debug_enabled
      max_iterations: 15

    - id: verify_debug_options
      description: "Verify debug options are visible"
      goal: "After the debug section appears, report what debug/testing options are available. Look for 'Hidden Libraries', developer settings, or testing toggles."
      checkpoint: debug_verified
      max_iterations: 10
