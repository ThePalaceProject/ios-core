scenario:
  id: back-navigation
  name: "Adversarial: Deep Navigation and Back"
  description: "Navigate deep into the app and test all back navigation methods."
  tags: [adversarial, ios, navigation]

  steps:
    - id: navigate_deep
      description: "Navigate deep into content"
      goal: "From the Catalog, tap on a 'More...' link for any section to see the full list. Then tap on a book in that list to view its detail page. You should now be 2-3 screens deep."
      checkpoint: deep_navigation
      max_iterations: 15

    - id: back_button
      description: "Test back button"
      goal: "Tap the '< Back' button or back arrow in the top-left corner of the screen to go back one screen. Verify you return to the previous screen."
      checkpoint: back_button_works
      max_iterations: 10

    - id: swipe_back
      description: "Test swipe-back gesture"
      goal: "Navigate into a book detail again by tapping a book. Then swipe from the left edge of the screen to the right (iOS back gesture) to go back. Verify the gesture works."
      checkpoint: swipe_back_works
      max_iterations: 15

    - id: tab_resets
      description: "Test tab bar resets navigation"
      goal: "Navigate into a book detail page. Then tap the Catalog tab at the bottom. Verify it returns to the root catalog view (not the detail page)."
      checkpoint: tab_resets_nav
      max_iterations: 15
