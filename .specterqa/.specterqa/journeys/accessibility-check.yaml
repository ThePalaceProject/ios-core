scenario:
  id: accessibility-check
  name: "Accessibility and UI Quality"
  description: "Check for accessibility issues, text truncation, layout problems."
  tags: [quality, ios, accessibility]

  steps:
    - id: check_catalog_ui
      description: "Inspect catalog UI quality"
      goal: "Look carefully at the Catalog screen. Report any: truncated text, overlapping elements, missing images (gray placeholders that never load), buttons without labels, or text that's too small to read."
      checkpoint: catalog_ui_checked
      max_iterations: 10

    - id: check_detail_ui
      description: "Inspect book detail UI quality"
      goal: "Open any book's detail page. Check for: complete title and author display, readable description text, properly sized cover image, accessible action buttons. Report any layout issues."
      checkpoint: detail_ui_checked
      max_iterations: 10

    - id: check_settings_ui
      description: "Inspect Settings UI quality"
      goal: "Go to Settings. Check for: all text readable, no overlapping elements, proper spacing, icons rendering correctly. Check both light and dark areas of the UI."
      checkpoint: settings_ui_checked
      max_iterations: 10

    - id: check_empty_states
      description: "Check empty state screens"
      goal: "Go to My Books (if no books borrowed) and Reservations (if no holds). Verify empty states show a helpful message, not a blank screen or error."
      checkpoint: empty_states_checked
      max_iterations: 10
